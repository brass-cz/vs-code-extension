name: Make GitHub Draft

on:
  push:
    tags:
      - v*

permissions:
  actions: read
  contents: write

jobs:
  meta:
    name: Check Version
    runs-on: ubuntu-latest
    outputs:
      pre_release: ${{ steps.pre-release.outputs.pre_release }}
      build_channel: ${{ steps.pre-release.outputs.build_channel }}
    steps:
      - name: Check pre-release
        id: pre-release
        run: |
          if [[ "${{ github.ref_name }}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "pre_release=false" >> $GITHUB_OUTPUT
          else
            echo "pre_release=true" >> $GITHUB_OUTPUT
          fi

  github-release:
    name: Create A GitHub Release
    runs-on: ubuntu-latest
    needs: 
      - meta
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Generate Release Notes
        run: |
          npx changelogithub@latest --contributors --output release.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup PNPM And Install dependencies
        uses: pnpm/action-setup@v6
      - name: Build
        run: |
          pnpm build
      - name: Release
        uses: softprops/action-gh-release@v3
        with:
          files: "artifacts/*"
          draft: true
          body_path: release.md
          prerelease: ${{ needs.meta.outputs.pre_release == 'true' }}
